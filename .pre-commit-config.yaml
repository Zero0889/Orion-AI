# Pre-commit hooks de O.R.I.O.N
# Instalación:
#     pip install pre-commit
#     pre-commit install
#
# Para correr en TODO el repo (no solo lo staged):
#     pre-commit run --all-files
#
# Para saltarse hooks en un commit puntual (NO recomendado):
#     git commit --no-verify  ← solo en emergencias

default_language_version:
  python: python3.11

repos:
  # ── Higiene básica ─────────────────────────────────────────────────
  # NOTA — `_STATE_FILES`: archivos que el runtime reescribe constantemente
  # (notifs, conversations, memoria, logs IoT). Los excluimos de los hooks
  # de "limpieza" (whitespace, EOF, line endings) porque cada commit los
  # toca y los hooks intentan "arreglarlos" en cada save, generando
  # conflictos con stash. La integridad de estos archivos la garantiza el
  # propio runtime, no el pre-commit.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$|^(config/notifications_store\.json|memory/conversations\.json|memory/quick_notes\.json|memory/long_term\.json|memory/iot_sensor_log\.csv)$'
      - id: end-of-file-fixer
        exclude: '^(config/notifications_store\.json|memory/conversations\.json|memory/quick_notes\.json|memory/long_term\.json|memory/iot_sensor_log\.csv)$'
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: '^(config/.*\.bak\.json|tools/.*)$'
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: '^(config/notifications_store\.json|memory/conversations\.json|memory/quick_notes\.json|memory/long_term\.json|memory/iot_sensor_log\.csv)$'
      - id: detect-private-key

  # ── Python: ruff lint + format ─────────────────────────────────────
  # Mantener `rev` alineado con la versión de ruff en requirements-dev.txt /
  # pyproject.toml. Si difieren, el hook puede no reconocer reglas nuevas
  # que el pyproject.toml usa (p.ej. RUF059 fue agregada en >=0.9).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ── Secret scanning (gitleaks) ─────────────────────────────────────
  # Detecta API keys, OAuth tokens, claves privadas, etc. antes del commit.
  # Si te marca un falso positivo, agregalo a .gitleaks.toml con allowlist.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── Frontend: prettier + eslint ────────────────────────────────────
  # Usamos hooks LOCALES que invocan el prettier/eslint de
  # web/node_modules (vía `npx --no-install`) en lugar del mirrors-prettier
  # de pre-commit. Razón: mirrors-prettier publica versiones distintas a
  # las que tenemos pinneadas en web/package.json, y el formateo difiere
  # entre versiones de prettier → CI rojo por drift de format que no
  # se reproduce local. Con hook local garantizamos la MISMA prettier
  # versión en hook y en `npm run format:check`.
  #
  # `web/.prettierignore` ya excluye openapi.json y generated.ts.
  - repo: local
    hooks:
      - id: prettier-web
        name: prettier (web)
        entry: bash -c 'cd web && npx --no-install prettier --write "src/**/*.{ts,tsx,css,json,md}"'
        language: system
        files: ^web/src/.*\.(ts|tsx|js|jsx|json|css|md)$
        pass_filenames: false
      - id: eslint
        name: eslint (web)
        entry: bash -c 'cd web && npx --no-install eslint --max-warnings=0 "src/**/*.{ts,tsx}"'
        language: system
        files: ^web/src/.*\.(ts|tsx)$
        pass_filenames: false
