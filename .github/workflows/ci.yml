name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancela runs viejos del mismo branch cuando llega un push nuevo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Backend Python — lint, type-check, tests
  # ────────────────────────────────────────────────────────────────────
  python:
    name: Python (${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + dev deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # No instalamos requirements.txt entero en CI: tiene paquetes
          # pesados (playwright, opencv, sounddevice) que ni hacen falta
          # para correr los tests unitarios. Sólo lo mínimo.
          pip install \
            fastapi "uvicorn[standard]" python-multipart websockets \
            requests beautifulsoup4 pillow numpy psutil structlog \
            google-genai google-auth google-auth-oauthlib google-api-python-client \
            pytest ruff mypy

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (módulos críticos)
        # Sólo los módulos en [[tool.mypy.overrides]] están bajo gate.
        # `--follow-imports=silent` evita que mypy reporte errores en
        # módulos transitivos no anotados (el resto del repo). El gate
        # sólo bloquea regresiones de tipo en los archivos críticos.
        # `--python-version` matchea la versión del runner: sin esto
        # mypy aplica el python_version del config (3.11) a TODOS los
        # archivos, incluso a los stubs de numpy 2.x que usan sintaxis
        # PEP 695 (`type X = ...`) y exigen Python 3.12+. Resultado:
        # "Type statement is only supported in Python 3.12 and greater"
        # incluso corriendo en 3.12.
        # IMPORTANTE — todo en UNA línea: `\` para continuar líneas
        # funciona en bash pero NO en PowerShell (default del runner
        # Windows), que lo interpreta como path literal `\` → `C:\` y
        # mypy intenta scanear el disco entero. Mantener en single line.
        run: mypy --python-version ${{ matrix.python-version }} --follow-imports=silent orion/core/logger.py orion/core/tool_registry.py orion/core/llm/base.py orion/server/app.py orion/server/event_bus.py orion/server/sharing.py orion/server/telemetry.py

      - name: Pytest
        env:
          PYTHONIOENCODING: utf-8
        run: pytest -ra

  # ────────────────────────────────────────────────────────────────────
  # Frontend — typecheck, lint, build
  # ────────────────────────────────────────────────────────────────────
  web:
    name: Web (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (vitest)
        run: npm run test:run

      - name: Build
        run: npm run build

  # ────────────────────────────────────────────────────────────────────
  # API types fresh — detecta drift entre OpenAPI del backend y los
  # tipos generados commiteados (web/src/api/{openapi.json,generated.ts}).
  # Si alguien cambia un endpoint o un schema Pydantic sin regenerar,
  # este job se pone rojo hasta que se commitee el `npm run gen:api`.
  # ────────────────────────────────────────────────────────────────────
  api-types-fresh:
    name: API types fresh (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps mínimas (sólo lo que necesita build_app)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi "uvicorn[standard]" python-multipart websockets \
            requests google-genai google-auth google-auth-oauthlib google-api-python-client \
            psutil structlog

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node deps
        working-directory: web
        run: npm ci

      - name: Check API types are fresh
        working-directory: web
        run: npm run gen:api:check

  # ────────────────────────────────────────────────────────────────────
  # Secret scanning — gitleaks sobre todo el diff
  # ────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks necesita el historial completo

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
